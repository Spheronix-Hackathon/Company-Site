<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spheronix Technology | Engineering the Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --violet-glow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background-color: #020617; /* Slate 950 */
            color: #e2e8f0; /* Slate 200 */
            overflow-x: hidden;
        }
        h1, h2, h3, h4 {
            font-family: 'Source Serif 4', serif;
        }

        /* 1. Cinematic Noise - Ultra subtle depth */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 40;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 2. Technical Grid Overlay - The Engineering Layer */
        .tech-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.03;
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        /* 3. Vision OS Glass - Premium Optical Feel */
        .glass-panel, .glass {
            background: rgba(10, 15, 30, 0.4); /* Darker, richer base */
            backdrop-filter: blur(24px); /* Heavy optical blur */
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.08); /* Specular highlight */
            box-shadow: 
                0 4px 24px -1px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(0, 0, 0, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.01); /* Inner glow */
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        .glass-panel:hover, .glass:hover {
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid rgba(139, 92, 246, 0.4); /* Violet highlight on hover */
            box-shadow: 
                0 20px 40px -4px rgba(0, 0, 0, 0.4),
                0 0 30px rgba(139, 92, 246, 0.1);
            transform: translateY(-4px) scale(1.005);
        }

        /* Glass Button Variant */
        .glass-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.15);
        }
        /* Shine effect for button */
        .glass-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: skewX(-25deg);
            transition: 0.5s;
        }
        .glass-btn:hover::after {
            left: 200%;
            transition: 0.7s ease-in-out;
        }

        /* Nav Glass - Frosted Header */
        .nav-glass {
            background: rgba(2, 6, 23, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
            border: 2px solid #020617;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8b5cf6;
        }

        /* Scanline Animation */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(139, 92, 246, 0.08), transparent);
            animation: scanline 4s linear infinite;
            pointer-events: none;
        }
        
        /* Reveal Animation Utilities */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: revealAnim 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes revealAnim {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Merged Styles from Training Project */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-gradient {
            background: linear-gradient(to right, #a78bfa, #d946ef); /* Violet-400 to Fuchsia-500 */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mask-gradient-y {
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        .pause-on-hover:hover {
            animation-play-state: paused;
        }
    </style>
</head>
<body class="antialiased selection:bg-violet-500/30 selection:text-violet-200">
    <div class="noise-overlay"></div>
    <div class="tech-grid"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
